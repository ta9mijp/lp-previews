<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SoulFood Peckham — Real Soul Food, Rooted in Peckham's Heart</title>
<meta name="description" content="SoulFood Peckham brings the warmth of Caribbean home cooking to SE15. Jerk chicken, oxtail, and more. Dine-in, takeaway & delivery.">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=DM+Sans:wght@300;400;500;600&family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#C0392B;
  --red-dark:#96281B;
  --red-light:#E8523F;
  --yellow:#F2C94C;
  --yellow-light:#FFF5CC;
  --cream:#FAF6EE;
  --cream-dark:#F0E8D8;
  --brown:#3D2314;
  --brown-mid:#6B3A2A;
  --text-dark:#1A0A05;
  --text-mid:#5C3D2E;
  --text-light:#9A7B6C;
  --white:#FFFFFF;
  --black:#0D0D0D;
  --border:#DDD0C0;
  --font-serif:'Playfair Display',serif;
  --font-sans:'DM Sans',sans-serif;
  --font-display:'Space Grotesk',sans-serif;
}
html{scroll-behavior:smooth;font-size:16px}
body{background:var(--cream);color:var(--text-dark);font-family:var(--font-sans);overflow-x:hidden}
img{max-width:100%;display:block}
a{text-decoration:none;color:inherit}

/* ─── DEMO BANNER ─── */
#demo-banner{
  position:fixed;top:0;left:0;right:0;z-index:9999;
  background:var(--brown);color:var(--yellow);
  padding:10px 20px;display:flex;align-items:center;justify-content:center;
  gap:16px;flex-wrap:wrap;font-family:var(--font-sans);font-size:.8rem;font-weight:500;
  text-align:center;
}
#demo-banner span{opacity:.9}
#demo-banner a.banner-btn{
  background:var(--yellow);color:var(--brown);
  padding:6px 16px;border-radius:50px;font-weight:700;font-size:.78rem;
  white-space:nowrap;transition:background .2s;
}
#demo-banner a.banner-btn:hover{background:#FFE070}

/* ─── STICKY HEADER ─── */
#sticky-header{
  position:fixed;top:40px;left:0;right:0;z-index:998;
  background:rgba(26,10,5,0.97);backdrop-filter:blur(8px);
  padding:14px 40px;display:flex;align-items:center;justify-content:space-between;
  transform:translateY(-110%);transition:transform .4s cubic-bezier(.4,0,.2,1);
}
#sticky-header.visible{transform:translateY(0)}
.sticky-logo{font-family:var(--font-serif);font-size:1.1rem;font-weight:900;color:var(--yellow);letter-spacing:.02em}
.sticky-nav{display:flex;gap:28px;list-style:none}
.sticky-nav a{color:rgba(255,255,255,.8);font-size:.82rem;font-weight:500;letter-spacing:.08em;text-transform:uppercase;transition:color .2s}
.sticky-nav a:hover{color:var(--yellow)}
.sticky-cta{background:var(--red);color:#fff;padding:8px 20px;border-radius:4px;font-size:.82rem;font-weight:600;letter-spacing:.04em;transition:background .2s}
.sticky-cta:hover{background:var(--red-dark)}

/* ─── HERO ─── */
#hero{
  position:relative;min-height:100vh;display:flex;align-items:flex-end;
  overflow:hidden;margin-top:40px;
}
#hero-bg{
  position:absolute;inset:0;z-index:0;
  background-image:url('images/img_0.jpg');
  background-size:cover;background-position:center;
  will-change:transform;
}
#hero-bg::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(to top, rgba(10,3,0,.92) 0%, rgba(10,3,0,.55) 45%, rgba(10,3,0,.15) 100%);
}
.hero-inner{
  position:relative;z-index:2;width:100%;
  padding:80px 60px 70px;
}
.hero-eyebrow{
  display:inline-flex;align-items:center;gap:10px;
  background:rgba(242,201,76,.15);border:1px solid rgba(242,201,76,.4);
  padding:6px 16px;border-radius:50px;margin-bottom:24px;
}
.hero-eyebrow span{color:var(--yellow);font-size:.75rem;font-weight:600;letter-spacing:.14em;text-transform:uppercase}
.hero-eyebrow i{color:var(--yellow);font-size:.7rem}
.hero-title{
  font-family:var(--font-serif);font-size:clamp(3rem,7vw,6rem);
  font-weight:900;color:#fff;line-height:1.05;
  max-width:700px;margin-bottom:20px;
}
.hero-title em{color:var(--yellow);font-style:italic}
.hero-tagline{
  color:rgba(255,255,255,.75);font-size:clamp(1rem,2vw,1.2rem);
  font-weight:300;max-width:520px;margin-bottom:36px;line-height:1.6;
}
.hero-actions{display:flex;gap:16px;flex-wrap:wrap;align-items:center;margin-bottom:48px}
.btn-primary{
  position:relative;overflow:hidden;
  background:var(--red);color:#fff;
  padding:16px 36px;border-radius:4px;
  font-size:1rem;font-weight:600;letter-spacing:.04em;
  display:inline-flex;align-items:center;gap:10px;
  transition:background .25s,transform .2s;border:none;cursor:pointer;
}
.btn-primary:hover{background:var(--red-dark);transform:translateY(-2px)}
.btn-secondary{
  position:relative;overflow:hidden;
  background:transparent;color:#fff;
  padding:16px 36px;border-radius:4px;
  font-size:1rem;font-weight:500;letter-spacing:.04em;
  border:1.5px solid rgba(255,255,255,.45);
  display:inline-flex;align-items:center;gap:10px;
  transition:border-color .25s,background .25s,transform .2s;cursor:pointer;
}
.btn-secondary:hover{border-color:#fff;background:rgba(255,255,255,.08);transform:translateY(-2px)}
.hero-meta{
  display:flex;align-items:center;gap:32px;flex-wrap:wrap;
  padding-top:32px;border-top:1px solid rgba(255,255,255,.15);
}
.hero-rating{display:flex;align-items:center;gap:10px}
.rating-stars{color:var(--yellow);font-size:.9rem;letter-spacing:2px}
.rating-text{color:rgba(255,255,255,.7);font-size:.82rem}
.rating-number{color:#fff;font-weight:700;font-size:1rem}
.hero-badge{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);
  padding:6px 14px;border-radius:50px;color:rgba(255,255,255,.8);font-size:.78rem;
}
.open-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:50px;font-size:.78rem;font-weight:600}
.open-badge.open{background:rgba(39,174,96,.2);border:1px solid rgba(39,174,96,.5);color:#6EE090}
.open-badge.closed{background:rgba(192,57,43,.2);border:1px solid rgba(192,57,43,.5);color:#FF8070}
.open-badge .dot{width:7px;height:7px;border-radius:50%;background:currentColor;animation:pulse-dot 1.4s ease-in-out infinite}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.3}}

/* ─── BOKEH PARTICLES ─── */
.bokeh-wrap{position:absolute;inset:0;z-index:1;pointer-events:none;overflow:hidden}
.bokeh-wrap span{
  position:absolute;border-radius:50%;
  background:radial-gradient(circle, rgba(242,201,76,.35) 0%, transparent 70%);
  animation:float-bokeh linear infinite;
}
@keyframes float-bokeh{
  0%{transform:translateY(0) scale(1);opacity:0}
  10%{opacity:1}
  90%{opacity:.6}
  100%{transform:translateY(-120vh) scale(1.3);opacity:0}
}

/* ─── SECTION COMMONS ─── */
.section-pad{padding:100px 0}
.section-pad-sm{padding:70px 0}
.container{max-width:1100px;margin:0 auto;padding:0 40px}
.section-label{
  display:inline-flex;align-items:center;gap:10px;margin-bottom:16px;
}
.section-label span{color:var(--red);font-size:.73rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase}
.section-label::before,.section-label::after{content:'';display:block;width:28px;height:1.5px;background:var(--red)}
.section-title{font-family:var(--font-serif);font-size:clamp(2rem,4vw,3.2rem);font-weight:900;color:var(--brown);line-height:1.12;margin-bottom:16px}
.section-title em{color:var(--red);font-style:italic}
.section-subtitle{color:var(--text-mid);font-size:1.05rem;font-weight:300;line-height:1.7;max-width:560px}

/* ─── MARQUEE / LOOP TEXT ─── */
.marquee-wrap{
  background:var(--red);overflow:hidden;padding:14px 0;
  border-top:3px solid var(--red-dark);border-bottom:3px solid var(--red-dark);
}
.marquee-inner{display:flex;gap:0;white-space:nowrap;animation:marquee-scroll 22s linear infinite}
.marquee-inner span{
  font-family:var(--font-serif);font-size:1.15rem;font-weight:700;font-style:italic;
  color:#fff;padding:0 30px;letter-spacing:.04em;
}
.marquee-inner span.sep{color:var(--yellow);font-style:normal}
@keyframes marquee-scroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

/* ─── ABOUT / CONCEPT ─── */
#about{background:var(--cream)}
.about-grid{display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:center}
.about-img-stack{position:relative;height:560px}
.about-img-main{
  position:absolute;top:0;left:0;width:75%;height:80%;
  object-fit:cover;border-radius:4px;
  box-shadow:0 24px 60px rgba(61,35,20,.25);
}
.about-img-secondary{
  position:absolute;bottom:0;right:0;width:58%;height:58%;
  object-fit:cover;border-radius:4px;
  box-shadow:0 16px 40px rgba(61,35,20,.2);
  border:6px solid var(--cream);
}
.about-accent{
  position:absolute;bottom:90px;left:0;
  background:var(--yellow);padding:20px 24px;border-radius:4px;
  box-shadow:0 8px 24px rgba(0,0,0,.15);z-index:2;
}
.about-accent p{font-family:var(--font-serif);font-size:1rem;font-weight:700;color:var(--brown);line-height:1.4}
.about-accent small{color:var(--brown-mid);font-size:.76rem;font-weight:500}
.about-content .about-text{color:var(--text-mid);font-size:1rem;line-height:1.85;margin-bottom:32px}
.philosophy-list{list-style:none;display:flex;flex-direction:column;gap:20px;margin-bottom:40px}
.philosophy-list li{display:flex;gap:16px;align-items:flex-start}
.phil-icon{
  flex-shrink:0;width:44px;height:44px;border-radius:50%;
  background:var(--yellow-light);border:2px solid var(--yellow);
  display:flex;align-items:center;justify-content:center;
  color:var(--red);font-size:.9rem;
}
.phil-body h4{font-family:var(--font-serif);font-size:1rem;font-weight:700;color:var(--brown);margin-bottom:4px}
.phil-body p{color:var(--text-mid);font-size:.88rem;line-height:1.65}

/* ─── STATS BAR ─── */
.stats-bar{background:var(--brown);padding:50px 0}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:40px;text-align:center}
.stat-item{}
.stat-number{
  font-family:var(--font-serif);font-size:2.8rem;font-weight:900;
  color:var(--yellow);line-height:1;margin-bottom:6px;
}
.stat-label{color:rgba(255,255,255,.6);font-size:.8rem;letter-spacing:.1em;text-transform:uppercase}

/* ─── MENU ─── */
#menu{background:var(--cream-dark)}
.menu-tabs{display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:50px}
.tab-btn{
  padding:14px 28px;font-family:var(--font-sans);font-size:.88rem;font-weight:600;
  letter-spacing:.08em;text-transform:uppercase;cursor:pointer;
  background:none;border:none;color:var(--text-light);
  border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .2s;
}
.tab-btn.active{color:var(--red);border-bottom-color:var(--red)}
.tab-btn:hover:not(.active){color:var(--brown)}
.tab-pane{display:none}
.tab-pane.active{display:block}
.menu-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:28px}
.menu-card{
  background:#fff;border-radius:6px;overflow:hidden;
  box-shadow:0 2px 16px rgba(61,35,20,.08);
  transition:transform .3s,box-shadow .3s;
}
.menu-card:hover{transform:translateY(-6px);box-shadow:0 12px 40px rgba(61,35,20,.18)}
.menu-card-body{padding:22px 24px}
.menu-card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.menu-item-name{font-family:var(--font-serif);font-size:1.1rem;font-weight:700;color:var(--brown);line-height:1.3}
.menu-item-price{
  font-family:var(--font-display);font-size:1rem;font-weight:700;
  color:var(--red);white-space:nowrap;padding-left:12px;
}
.menu-item-desc{color:var(--text-mid);font-size:.87rem;line-height:1.65}
.menu-category-label{
  display:inline-block;background:var(--yellow-light);color:var(--brown-mid);
  font-size:.68rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
  padding:3px 10px;border-radius:50px;margin-bottom:8px;border:1px solid var(--yellow);
}
.menu-disclaimer{
  margin-top:36px;padding:18px 24px;
  background:rgba(242,201,76,.12);border:1px dashed var(--yellow);
  border-radius:4px;color:var(--text-mid);font-size:.84rem;font-style:italic;text-align:center;
}

/* ─── SERVICES STRIP ─── */
.services-strip{
  background:var(--red);padding:28px 0;
}
.services-inner{display:flex;justify-content:center;gap:60px;flex-wrap:wrap}
.service-item{display:flex;align-items:center;gap:12px;color:#fff}
.service-item i{font-size:1.4rem;color:var(--yellow)}
.service-item span{font-size:.9rem;font-weight:500;letter-spacing:.06em}

/* ─── REVIEWS ─── */
#reviews{background:var(--cream)}
.reviews-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:28px;margin-top:48px}
.review-card{
  background:#fff;padding:32px 28px;border-radius:6px;
  box-shadow:0 2px 16px rgba(61,35,20,.08);
  border-top:4px solid var(--yellow);
  position:relative;
}
.review-card::before{
  content:'\201C';
  font-family:var(--font-serif);font-size:5rem;color:var(--yellow-light);
  position:absolute;top:10px;left:20px;line-height:1;
}
.review-stars{color:var(--yellow);font-size:.85rem;margin-bottom:14px}
.review-text{color:var(--text-mid);font-size:.9rem;line-height:1.75;margin-bottom:20px;position:relative;z-index:1}
.review-author{font-family:var(--font-serif);font-weight:700;color:var(--brown);font-size:.92rem}

/* ─── LOCATION / INFO ─── */
#location{background:var(--brown)}
.location-grid{display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:start}
.location-content .section-title{color:var(--yellow)}
.location-content .section-subtitle{color:rgba(255,255,255,.65)}
.info-block{margin-top:36px;display:flex;flex-direction:column;gap:20px}
.info-row{display:flex;gap:16px;align-items:flex-start}
.info-icon{flex-shrink:0;color:var(--yellow);font-size:1rem;margin-top:3px}
.info-detail h5{color:rgba(255,255,255,.5);font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;margin-bottom:4px}
.info-detail p,.info-detail a{color:#fff;font-size:.95rem;line-height:1.6}
.info-detail a:hover{color:var(--yellow)}
.hours-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px 16px;margin-top:8px}
.hours-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.08);font-size:.85rem}
.hours-day{color:rgba(255,255,255,.5)}
.hours-time{color:rgba(255,255,255,.85);text-align:right}
.hours-row.today .hours-day,.hours-row.today .hours-time{color:var(--yellow);font-weight:600}
.social-icons{display:flex;gap:14px;margin-top:28px}
.social-icon{
  width:44px;height:44px;border-radius:50%;
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);
  display:flex;align-items:center;justify-content:center;
  color:rgba(255,255,255,.7);font-size:1rem;transition:all .25s;
}
.social-icon:hover{background:var(--yellow);color:var(--brown);border-color:var(--yellow)}
.map-container{
  border-radius:6px;overflow:hidden;
  box-shadow:0 24px 60px rgba(0,0,0,.4);
  height:420px;
}
.map-container iframe{width:100%;height:100%;border:none}
.directions-link{
  display:inline-flex;align-items:center;gap:8px;
  margin-top:16px;color:var(--yellow);font-size:.88rem;font-weight:600;
  border-bottom:1px solid rgba(242,201,76,.4);padding-bottom:2px;
  transition:border-color .2s;
}
.directions-link:hover{border-color:var(--yellow)}

/* ─── FOOTER ─── */
footer{background:var(--black);padding:48px 0 32px}
.footer-inner{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:24px}
.footer-logo{font-family:var(--font-serif);font-size:1.4rem;font-weight:900;color:var(--yellow)}
.footer-logo small{display:block;color:rgba(255,255,255,.4);font-size:.72rem;font-weight:400;font-family:var(--font-sans);letter-spacing:.1em;text-transform:uppercase;margin-top:2px}
.footer-links{display:flex;gap:24px;list-style:none}
.footer-links a{color:rgba(255,255,255,.45);font-size:.8rem;transition:color .2s}
.footer-links a:hover{color:#fff}
.footer-copy{color:rgba(255,255,255,.3);font-size:.75rem;width:100%;text-align:center;padding-top:28px;border-top:1px solid rgba(255,255,255,.08);margin-top:16px}

/* ─── FLOATING CALL BUTTON ─── */
#floating-call{
  position:fixed;bottom:28px;right:28px;z-index:990;
  background:var(--red);color:#fff;
  width:58px;height:58px;border-radius:50%;
  display:none;align-items:center;justify-content:center;
  font-size:1.4rem;box-shadow:0 6px 24px rgba(192,57,43,.5);
  transition:transform .2s,background .2s;
}
#floating-call:hover{background:var(--red-dark);transform:scale(1.1)}
@media(max-width:768px){#floating-call{display:flex}}

/* ─── RIPPLE ─── */
.ripple{
  position:absolute;border-radius:50%;
  background:rgba(255,255,255,.35);
  transform:scale(0);animation:ripple-anim .6s linear;
  pointer-events:none;
}
@keyframes ripple-anim{to{transform:scale(4);opacity:0}}

/* ─── RESPONSIVE ─── */
@media(max-width:1024px){
  .about-grid{grid-template-columns:1fr;gap:50px}
  .about-img-stack{height:360px}
  .location-grid{grid-template-columns:1fr;gap:40px}
  .reviews-grid{grid-template-columns:1fr 1fr}
  .stats-grid{grid-template-columns:repeat(2,1fr);gap:30px}
  .hero-inner{padding:60px 40px 60px}
}
@media(max-width:768px){
  .sticky-nav{display:none}
  #sticky-header{padding:12px 24px}
  .hero-inner{padding:40px 24px 80px}
  .hero-title{font-size:2.6rem}
  .container{padding:0 24px}
  .section-pad{padding:70px 0}
  .reviews-grid{grid-template-columns:1fr}
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  .services-inner{gap:30px}
  .about-img-stack{height:280px}
  .about-img-secondary{width:65%;height:52%}
  .hours-grid{grid-template-columns:1fr}
  .menu-grid{grid-template-columns:1fr}
  .footer-inner{flex-direction:column;text-align:center}
}
@media(max-width:480px){
  .hero-actions{flex-direction:column;width:100%}
  .btn-primary,.btn-secondary{width:100%;justify-content:center}
  .hero-meta{gap:14px}
  .stats-grid{grid-template-columns:1fr 1fr}
  .stat-number{font-size:2rem}
}
</style>
</head>
<body>

<!-- DEMO BANNER -->
<div id="demo-banner">
  <span>🎨 Free demo for SoulFood Peckham — All images, text &amp; colours are placeholders and fully customisable.</span>
  <a href="https://wa.me/447761256742" class="banner-btn" target="_blank">Let's talk → WhatsApp</a>
</div>

<!-- STICKY HEADER -->
<header id="sticky-header">
  <div class="sticky-logo">SoulFood Peckham</div>
  <ul class="sticky-nav">
    <li><a href="#about">About</a></li>
    <li><a href="#menu">Menu</a></li>
    <li><a href="#reviews">Reviews</a></li>
    <li><a href="#location">Find Us</a></li>
  </ul>
  <a href="tel:07980940001" class="sticky-cta ripple-btn"><i class="fas fa-phone"></i> Call Now</a>
</header>

<!-- HERO -->
<section id="hero">
  <div id="hero-bg"></div>
  <div class="bokeh-wrap" id="bokeh"></div>
  <div class="hero-inner">
    <div class="hero-eyebrow" data-aos="fade-up" data-aos-duration="600">
      <i class="fas fa-map-marker-alt"></i>
      <span>Peckham, London SE15</span>
    </div>
    <h1 class="hero-title" data-aos="fade-up" data-aos-duration="700" data-aos-
